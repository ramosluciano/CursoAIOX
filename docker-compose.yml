version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cursoaiox-postgres
    environment:
      POSTGRES_DB: cursoaiox_dev
      POSTGRES_USER: aiox_user
      POSTGRES_PASSWORD: aiox_password_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiox_user -d cursoaiox_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cursoaiox-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@cursoaiox.local
      PGADMIN_DEFAULT_PASSWORD: dev_password
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: cursoaiox-network
