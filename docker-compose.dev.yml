services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aiox-course-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - aiox-network
    volumes:
      # Volume for hot reload during development
      - .:/app
      # Exclude node_modules from volume mount to avoid permission issues
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  aiox-network:
    driver: bridge
