# ============================================================================
# DEVELOPMENT ONLY - For local development with pgAdmin
# ============================================================================
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Services:
#   - PostgreSQL (port 5432)
#   - pgAdmin 4 (port 5050) - Email: dev@cursoaiox.com | Password: dev_password
#   - Next.js App (port 3000)
#
# NEVER use this for production. Use docker-compose.yml instead.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cursoaiox-postgres
    environment:
      POSTGRES_DB: cursoaiox_dev
      POSTGRES_USER: aiox_user
      POSTGRES_PASSWORD: aiox_password_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiox_user -d cursoaiox_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursoaiox-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cursoaiox-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@cursoaiox.com
      PGADMIN_DEFAULT_PASSWORD: dev_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cursoaiox-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursoaiox-app
    environment:
      DATABASE_URL: postgresql://aiox_user:aiox_password_dev_only@postgres:5432/cursoaiox_dev
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cursoaiox-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cursoaiox-network:
    driver: bridge
